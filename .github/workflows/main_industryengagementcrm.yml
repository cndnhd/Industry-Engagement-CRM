name: Build and deploy Node.js app to Azure Web App - IndustryEngagementCRM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build Next.js app
        working-directory: web
        run: npm run build -- --webpack

      - name: Create deployment zip
        run: |
          cd web
          zip -r ../deploy.zip .next node_modules package.json package-lock.json next.config.ts public -x "node_modules/.cache/*" ".next/cache/*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5889E3FACE5648AEB4168DEE1F63E6B3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E6886389349849C6AEC60425FDE55611 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E6878D0B27E44FF5A979D024F222DD1F }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'IndustryEngagementCRM'
          slot-name: 'Production'
          package: deploy.zip
